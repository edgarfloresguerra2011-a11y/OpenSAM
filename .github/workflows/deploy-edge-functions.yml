name: Deploy Edge Functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - '.github/workflows/deploy-edge-functions.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Supabase
    runs-on: ubuntu-latest
    environment:
      name: production
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          supabase functions deploy opportunities-search \
            --project-ref "$PROJECT_REF" --no-verify-jwt
          supabase functions deploy analyze-opportunity \
            --project-ref "$PROJECT_REF" --no-verify-jwt

      - name: Set secrets
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SAM_GOV_API_KEY: ${{ secrets.SAM_GOV_API_KEY }}
          CORS_ALLOW_ORIGIN: ${{ secrets.CORS_ALLOW_ORIGIN }}
        run: |
          [ -n "$GEMINI_API_KEY" ]   && supabase secrets set GEMINI_API_KEY="$GEMINI_API_KEY"     --project-ref "$PROJECT_REF"
          [ -n "$SAM_GOV_API_KEY" ]  && supabase secrets set SAM_GOV_API_KEY="$SAM_GOV_API_KEY"   --project-ref "$PROJECT_REF"
          [ -n "$CORS_ALLOW_ORIGIN" ] && supabase secrets set CORS_ALLOW_ORIGIN="$CORS_ALLOW_ORIGIN" --project-ref "$PROJECT_REF"
