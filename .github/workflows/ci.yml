name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs when the same PR is updated.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────────────────────────────────────
  # Frontend: lint, typecheck, test, build
  # ────────────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend · lint + types + test + build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Prettier check
        run: npx prettier --check .

      - name: ESLint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test (with coverage)
        run: npm run test:coverage

      - name: Build
        run: npm run build
        env:
          # Build with placeholder public env vars — the bundle will
          # run in demo mode. Real values are injected at deploy time.
          VITE_SUPABASE_URL: 'https://placeholder.supabase.co'
          VITE_SUPABASE_ANON_KEY: 'placeholder-anon-key'

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 7

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ────────────────────────────────────────────────────────────────────────
  # Edge Functions: typecheck with Deno
  # ────────────────────────────────────────────────────────────────────────
  edge-functions:
    name: Edge Functions · deno check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v1.x

      - name: Cache Deno dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.deno
            ~/.cache/deno
          key: ${{ runner.os }}-deno-${{ hashFiles('supabase/functions/**/*.ts') }}

      - name: Type-check Edge Functions
        run: |
          deno check --config=supabase/functions/deno.json \
            supabase/functions/opportunities-search/index.ts \
            supabase/functions/analyze-opportunity/index.ts

      - name: Lint Edge Functions
        run: |
          deno lint --config=supabase/functions/deno.json supabase/functions/

  # ────────────────────────────────────────────────────────────────────────
  # Security: audit dependencies
  # ────────────────────────────────────────────────────────────────────────
  audit:
    name: Security · npm audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - name: npm audit (production deps only)
        # Fail only on high or critical vulnerabilities in production deps.
        # Continue-on-error on PRs to avoid blocking development; enforce on main.
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: ${{ github.event_name == 'pull_request' }}
