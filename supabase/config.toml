# Supabase local dev / CLI config.
# Docs: https://supabase.com/docs/guides/local-development

project_id = "opensam"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["https://localhost:5173"]
jwt_expiry = 3600
refresh_token_rotation_enabled = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[functions.opportunities-search]
verify_jwt = true

[functions.analyze-opportunity]
verify_jwt = true

# Secret names that must be set with `supabase secrets set <NAME>=<value>`:
#   GEMINI_API_KEY
#   SAM_GOV_API_KEY
#   SUPABASE_URL            (auto-set by platform)
#   SUPABASE_ANON_KEY       (auto-set by platform)
#   SUPABASE_SERVICE_ROLE_KEY (auto-set by platform)
#   CORS_ALLOW_ORIGIN       (optional — defaults to "*")
